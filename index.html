<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beitreten - ARCANE PHOENIX CLAN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        a { text-decoration: none; color: inherit; }
        a:hover { color:#ffffff; text-decoration:none; }
        body {
            font-family:'Orbitron',sans-serif;
            background: radial-gradient(circle at top,#0a0f1f,#02030a);
            color:#e0f7ff;
            min-height:100vh;
        }
        .background-canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        .sidebar, header, #hyvor-talk, #hyvor-talk-view, .phoenix, footer, section, .section, .sidebar-links, .container { position: relative; z-index:11; }

        @media (min-width: 769px) {
            .container { margin-left: 220px; width: calc(100% - 220px); max-width: none; padding: 40px; position: relative; z-index:20; isolation:isolate; }
        }
        header { text-align:center; margin-bottom:40px; }
        header img.logo { width:200px; margin-bottom:20px; }
        header h1 { font-size:3rem; letter-spacing:4px; color:#00f6ff; text-shadow:0 0 15px #00f6ff; }
        header p { margin-top:10px; font-size:1rem; opacity:0.8; }

        .sidebar { position:fixed; top:0; left:0; width:220px; height:100%; display:flex; flex-direction:column; background:linear-gradient(145deg,#001f33,#000a11); border-right:1px solid rgba(0,255,255,0.2); z-index:30; transition: transform 0.3s ease; }
        .sidebar-links { list-style:none; margin:0; padding:20px 10px; display:flex; flex-direction:column; gap:15px; }
        .sidebar-links li a { color:#e0f7ff; font-weight:500; padding:8px 12px; border-radius:6px; display:block; transition:0.2s ease; }
        .sidebar-links li a:hover { background: rgba(0,246,255,0.1); color:#00f6ff; }
        #menu-toggle { display:none; position:absolute; top:15px; right:15px; font-size:1.2rem; color:#00f6ff; background: rgba(10,20,40,0.85); padding:6px 10px; border-radius:6px; cursor:pointer; z-index:1100; }
        @media(max-width:1024px){ .sidebar { transform: translateX(-220px); } .sidebar.open { transform: translateX(0); } #menu-toggle { display:block; } .container { margin-left:0; padding:20px; width:auto; } }

        .section { margin-bottom:60px; padding:20px; }
        .section h2 { color:#00f6ff; text-align:center; margin-bottom:15px; text-shadow:0 0 10px #00f6ff; }
        .section p { text-align:center; line-height:1.5; }
        .hero { text-align:center; margin-bottom:40px; }
        .hero h1 { font-size:2.5rem; color:#00f6ff; text-shadow:0 0 15px #00f6ff; }
        .hero p { font-size:1.1rem; opacity:0.85; margin-top:15px; }

        /* Call to Action Box */
        .cta-box { border:1px solid rgba(0,255,255,0.3); padding:30px 20px; text-align:center; margin:20px auto; max-width:700px; border-radius:6px; transition:0.3s ease; background:linear-gradient(145deg,#001127,#000512); }
        .cta-box:hover { box-shadow:0 0 30px rgba(0,246,255,0.25); border-color:#00f6ff; }
        .cta-box h3 { font-size:1.5rem; margin-bottom:15px; color:#00f6ff; }
        .cta-box p { font-size:1rem; margin-bottom:20px; color:#d0faff; line-height:1.6; }
        .cta-box a { display:inline-block; padding:12px 25px; border:1px solid #00f6ff; color:#00f6ff; font-weight:600; border-radius:6px; transition:0.2s ease; }
        .cta-box a:hover { background: rgba(0,246,255,0.1); }

        footer {
            margin-top: 40px;
            text-align: center;
            width: 100%;       /* standard: volle Breite */
            font-size: 0.8rem;
            opacity: 0.5;
        }

        @media(min-width:769px){ footer { width: calc(100% - 420px); margin-left:220px; } }

        /* ===== PIXEL PHOENIX (ANIMIERT) ===== */
        .phoenix {
            display: grid;
            grid-template-columns: repeat(11, 12px);
            gap: 2px;
            justify-content: center;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(255, 120, 0, 0.7));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .pixel {
            width: 12px;
            height: 12px;
            background: transparent;
        }

        .fire1 {
            background: #ffdd55;
            animation: flicker1 1.5s infinite alternate;
        }

        .fire2 {
            background: #ff9933;
            animation: flicker2 1.2s infinite alternate;
        }

        .fire3 {
            background: #ff5500;
            animation: flicker3 1s infinite alternate;
        }

        .fire4 {
            background: #cc2200;
            animation: flicker4 1.3s infinite alternate;
        }

        @keyframes flicker1 {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.7; transform: scale(0.9); }
        }

        @keyframes flicker2 {
            from { opacity: 1; }
            to { opacity: 0.6; }
        }

        @keyframes flicker3 {
            from { opacity: 0.9; }
            to { opacity: 0.5; }
        }

        @keyframes flicker4 {
            from { opacity: 0.8; }
            to { opacity: 0.4; }
        }

                /* QUICK LINKS – Wynncraft inspiriert */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 70px;
        }

        .quick-card {
            background: linear-gradient(145deg, #001f33, #000a11);
            border: 1px solid rgba(0,255,255,0.25);
            padding: 40px;
            max-width: 220px;
            margin: auto;
            text-align: center;
            transition: all 0.25s ease;
            position: relative;
        }

        .quick-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid rgba(0,255,255,0.1);
            pointer-events: none;
        }

        .quick-card:hover {
            transform: translateY(-4px);
            border-color: #00f6ff;
            box-shadow: 0 0 20px rgba(0,246,255,0.15);
        }

        .quick-card .icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.85;
        }

        .quick-card h3 {
            color: #00f6ff;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .quick-card p {
            font-size: 0.85rem;
            opacity: 0.75;
        }

        /* Hervorgehobene Box (Call to Action) */
        .quick-card.highlight {
            border-color: rgba(255,180,0,0.6);
        }

        .quick-card.highlight h3 {
            color: #ffb400;
        }

        #hyvor-talk-view {
            width: 100%;
            min-height: 600px; /* oder beliebige Höhe */
            max-width: 1200px;
            margin: 40px auto; /* zentriert */
        }

    </style>
</head>
<body>
    <!-- Hintergrund-Canvas -->
    <div class="background-canvas">
        <canvas id="sci-fi-bg"></canvas>
    </div>

    <!-- Hamburger -->
    <div id="menu-toggle">☰ Menü</div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <ul class="sidebar-links">
            <li><a href="index.html">🏠 Startseite</a></li>
            <li><a href="mitglieder.html">👥 Mitglieder</a></li>
            <li><a href="projekte.html">⭐ Projekte</a></li>
            <li><a href="beitritt.html">📡 Beitritt</a></li>
            <li><a href="intern.html">🔒 Intern</a></li>
        </ul>
    </div>

    <div class="container">
        <header>
        <div class="phoenix">
            <div class="pixel"></div><div class="pixel"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel"></div><div class="pixel"></div>
            <div class="pixel"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire4"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire4"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel"></div>
            <div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire4"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel fire1"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire4"></div><div class="pixel fire3"></div><div class="pixel fire2"></div>
            <div class="pixel"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel"></div><div class="pixel fire1"></div><div class="pixel"></div><div class="pixel fire2"></div><div class="pixel fire3"></div><div class="pixel fire2"></div><div class="pixel"></div>
            <div class="pixel"></div><div class="pixel"></div><div class="pixel fire2"></div><div class="pixel"></div><div class="pixel"></div><div class="pixel fire1"></div><div class="pixel"></div><div class="pixel"></div><div class="pixel fire2"></div><div class="pixel"></div><div class="pixel"></div>
        </div>
        </header>

        <!-- Hyvor Talk Embed -->
        <div id="hyvor-talk-view"></div>
        <script>
          var HYVOR_TALK_WEBSITE = 15074; // <--- DEINE Website ID
          (function() {
            var s = document.createElement("script");
            s.src = "https://talk.hyvor.com/web-api/embed";
            s.async = true;
            document.body.appendChild(s);
          })();
        </script>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');
        menuToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); });

        // Sci-Fi Hintergrund
        const canvas = document.getElementById('sci-fi-bg');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const fontSize = 16;
        const columns = Math.floor(width / fontSize);
        const drops = Array(columns).fill(0);
        const characters = '01'.split('');
        for(let i=0;i<drops.length;i++){ drops[i]=Math.floor(Math.random()*height/fontSize); }
        function draw(){
            ctx.fillStyle='rgba(10,15,25,0.3)';
            ctx.fillRect(0,0,width,height);
            ctx.fillStyle='rgba(0,180,255,0.15)';
            ctx.font=fontSize+'px Orbitron';
            for(let i=0;i<drops.length;i++){
                ctx.fillText(characters[Math.floor(Math.random()*characters.length)], i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize>height && Math.random()>0.975){ drops[i]=0; }
                drops[i]++;
            }
        }
        setInterval(draw,50);
        window.addEventListener('resize',()=>{
            width=canvas.width=window.innerWidth;
            height=canvas.height=window.innerHeight;
            for(let i=0;i<drops.length;i++){ drops[i]=Math.floor(Math.random()*height/fontSize); }
        });
    </script>
</body>
</html>
